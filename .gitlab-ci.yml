stages:
    - check
    - pack
    - build
    - upload
    - release

variables:
    PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}"

check-job:
    stage: check
    image: alpine:latest
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    before_script:
        - apk add --update zip
        - apk add --update jq
    script:
        - find data/ -name "*.json" -print0 | {
          status=0;
          while IFS= read -d '' -r filename; do
          if ! jq . "$filename" >/dev/null 2>&1; then
          echo "$filename bad";
          status=1;
          fi;
          done;
          exit "$status";
          }

pack-job:
    stage: pack
    image: node:latest
    rules:
        - if: $CI_COMMIT_TAG # Run this job when a tag is created
    before_script:
        - npm install
    script:
        - npm run pack
    artifacts:
        paths:
            - packs/
        when: on_success
        expire_in: 1 day

build-job:
    stage: build
    image: alpine:latest
    rules:
        - if: $CI_COMMIT_TAG # Run this job when a tag is created
    dependencies:
        - pack-job
    before_script:
        - apk add --update zip
        - apk add --update jq
    script:
        - |
            jq --arg version "$CI_COMMIT_TAG" --arg download "https://gitlab.com/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/-/releases/$CI_COMMIT_TAG/downloads/pf2e-ru.zip" --arg manifest "https://gitlab.com/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/-/releases/permalink/latest/downloads/module.json" '.version=$version | .download=$download | .manifest=$manifest' module.json > module1.json
        - mv module1.json module.json
        - zip module.zip -r *
          -x
          "build/*"
          ".editorconfig"
          ".gitattributes"
          ".gitignore"
          ".gitlab-ci.yml"
          "packs/journals/_source/*"
          "package.json"
    artifacts:
        paths:
            - module.zip
            - module.json
        when: on_success
        expire_in: 1 day

upload-job:
    stage: upload
    image: curlimages/curl:latest
    rules:
        - if: $CI_COMMIT_TAG
    script:
        - |
            curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file module.json "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/module.json"
        - |
            curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file module.zip "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/pf2e-ru.zip"

release-job:
    stage: release
    image: registry.gitlab.com/gitlab-org/release-cli:latest
    rules:
        - if: $CI_COMMIT_TAG # Run this job when a tag is created
    script:
        - echo "running release_job"
    release: # See https://docs.gitlab.com/ee/ci/yaml/#release for available properties
        tag_name: "$CI_COMMIT_TAG"
        description: "$CI_COMMIT_TAG"
        assets:
            links:
                - name: "module.json"
                  filepath: "/module.json"
                  url: "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/module.json"
                - name: "pf2e-ru.zip"
                  filepath: "/pf2e-ru.zip"
                  url: "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/pf2e-ru.zip"
